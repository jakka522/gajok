<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lyrics Player</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:
  linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
  url("https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1200");
  background-size:cover;
  background-position:center;
  filter:blur(3px);
  transform:scale(1.1);
}

#lyrics{
  position:relative;
  color:white;
  font-size:42px;
  text-align:center;
  width:80%;
  line-height:1.5;
  text-shadow:0 0 20px white;
  transition:0.4s;
}

.show{
  opacity:1;
  transform:scale(1);
}

.hide{
  opacity:0;
  transform:scale(0.8);
}

audio{
  position:absolute;
  bottom:30px;
  width:80%;
}
</style>
</head>
<body>

<div class="bg"></div>

<div id="lyrics" class="show">

const song = document.getElementById("song");
const lyrics = document.getElementById("lyrics");

song.addEventListener("timeupdate", () => {

  const current = song.currentTime;

  lyricsData.forEach((line,index)=>{

    const next = lyricsData[index+1];

    if(
      current >= line.time &&
      (!next || current < next.time)
    ){

      if(lyrics.innerText != line.text){

        lyrics.className = "hide";

        setTimeout(()=>{
          lyrics.innerText = line.text;
          lyrics.className = "show";
        },200);

      }

    }

  });

});
